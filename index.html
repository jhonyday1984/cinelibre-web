<!DOCTYPE html>
<html lang="es" prefix="og: https://ogp.me/ns#">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>CineLibre 3D — TV en Vivo del Mundo | Globo Interactivo</title>
<meta name="description" content="Explora la televisión mundial en un globo 3D. TV de Chile, Argentina, México, España, Japón y más. Cine gratis y documentales 24/7 sin registro.">
<meta name="keywords" content="tv en vivo, cine gratis, globo 3d, television chilena vivo, canales internacionales gratis, cinelibre">
<link rel="canonical" href="https://cinelibre.cl/">
<meta name="theme-color" content="#d4a843">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #d4a843; --gold2: #f0c96a;
    --red: #e03545; --bg: #07070f;
    --bg2: #0d0d1a; --bd: rgba(255,255,255,.08);
    --txt: #ede9e2; --mut: #6b6575;
    --fh: 'Bebas Neue', sans-serif; --fb: 'DM Sans', sans-serif;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--txt); font-family:var(--fb); }

/* --- GLOBO --- */
#canvas-container { position:fixed; inset:0; cursor:grab; background: radial-gradient(circle at center, #101025 0%, #07070f 100%); }
#canvas-container:active { cursor:grabbing; }

/* --- UI OVERLAY --- */
#topbar {
    position:fixed; top:0; left:0; right:0; height:60px; z-index:500;
    background: rgba(7,7,15,.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--bd); display:flex; align-items:center; padding:0 20px; gap:15px;
}
.logo { font-family:var(--fh); font-size:1.8rem; letter-spacing:2px; text-decoration:none; color:var(--txt); }
.logo span { color:var(--gold); }

#search-wrap { flex:1; max-width:400px; position:relative; }
#search-input { 
    width:100%; height:38px; background:rgba(255,255,255,.05); border:1px solid var(--bd);
    border-radius:100px; padding:0 40px; color:var(--txt); outline:none; transition: .2s;
}
#search-input:focus { border-color:var(--gold); background:rgba(255,255,255,.08); }

/* --- PANEL LATERAL --- */
#panel {
    position:fixed; top:60px; left:0; bottom:0; width:340px; z-index:400;
    background: rgba(12,12,22,.95); border-right: 1px solid var(--bd);
    backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    transform: translateX(-100%); transition: transform .4s cubic-bezier(0.4, 0, 0.2, 1);
    display:flex; flex-direction:column;
}
#panel.open { transform: translateX(0); }

.panel-header { padding:20px; border-bottom:1px solid var(--bd); }
.country-title { font-family:var(--fh); font-size:2rem; color:var(--gold); line-height:1; }
.country-meta { font-size:0.8rem; color:var(--mut); text-transform:uppercase; letter-spacing:1px; margin-top:5px; }

.channel-list { flex:1; overflow-y:auto; padding:15px; }
.channel-card {
    background: rgba(255,255,255,.03); border: 1px solid var(--bd); border-radius:12px;
    margin-bottom:12px; overflow:hidden; cursor:pointer; transition:.2s;
}
.channel-card:hover { transform: translateY(-3px); border-color:var(--gold); background:rgba(212,168,67,.05); }
.thumb { width:100%; aspect-ratio:16/9; background:#000; position:relative; }
.thumb img { width:100%; height:100%; object-fit:cover; }
.live-tag { 
    position:absolute; top:8px; left:8px; background:var(--red); color:#fff; 
    font-size:10px; font-weight:bold; padding:2px 6px; border-radius:4px; text-transform:uppercase;
}
.card-info { padding:10px; }
.card-name { font-weight:700; font-size:0.95rem; margin-bottom:2px; }
.card-cat { font-size:0.75rem; color:var(--mut); }

/* --- PLAYER MODAL (IGUAL A CINELIBRE) --- */
#modal {
    position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.95);
    display:none; align-items:center; justify-content:center; padding:20px;
}
#modal.active { display:flex; }
.modal-content { width:100%; max-width:1000px; background:var(--bg2); border-radius:16px; overflow:hidden; border:1px solid var(--gold); }
.modal-header { padding:15px; display:flex; justify-content:space-between; align-items:center; background:var(--bg); }
.player-container { position:relative; width:100%; aspect-ratio:16/9; background:#000; }
.player-container iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }

/* --- MOBILE ADAPTATION --- */
@media (max-width: 600px) {
    #panel { width:100%; height:60vh; top:auto; transform: translateY(100%); border-right:none; border-top:1px solid var(--bd); border-radius:20px 20px 0 0; }
    #panel.open { transform: translateY(0); }
    .logo span { display:none; }
}

/* --- LIVE DOTS ANIMATION --- */
.ld-pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div id="canvas-container"></div>

<header id="topbar">
    <a href="/" class="logo">CINE<span>LIBRE</span></a>
    <div id="search-wrap">
        <input type="text" id="search-input" placeholder="Buscar país o canal...">
    </div>
</header>

<aside id="panel">
    <div class="panel-header">
        <div class="country-title" id="p-name">MUNDO</div>
        <div class="country-meta" id="p-meta">Selecciona un punto en el globo</div>
    </div>
    <div class="channel-list" id="p-list">
        </div>
</aside>

<div id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="m-title" style="font-family:var(--fh); letter-spacing:1px;">Cargando...</h3>
            <button onclick="closePlayer()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <div class="player-container">
            <iframe id="m-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* --- DATOS DE CANALES --- */
const TV_DATA = [
    { country: "Chile", lat: -33.45, lng: -70.67, code: "CL", channels: [
        { name: "24 Horas TVN", yt: "mBBFJMsMPkY", cat: "Noticias" },
        { name: "CHV Noticias", yt: "zcWXboTnous", cat: "Noticias" }
    ]},
    { country: "Argentina", lat: -34.6, lng: -58.38, code: "AR", channels: [
        { name: "A24 Argentina", yt: "ArKbAx1K-2U", cat: "Noticias" },
        { name: "TN En Vivo", yt: "cb12KmMMDJA", cat: "Noticias" }
    ]},
    { country: "México", lat: 19.43, lng: -99.13, code: "MX", channels: [
        { name: "Milenio TV", yt: "tQ941SU5UR0", cat: "Noticias" },
        { name: "Foro TV", yt: "VeaBLCh8MZU", cat: "Información" }
    ]},
    { country: "Japón", lat: 35.68, lng: 139.69, code: "JP", channels: [
        { name: "NHK World Japan", yt: "f0lYkdA-Gtw", cat: "Internacional" }
    ]},
    { country: "Corea del Sur", lat: 37.56, lng: 126.97, code: "KR", channels: [
        { name: "KBS World", yt: "XGr6ynEZgJk", cat: "K-Drama" },
        { name: "Arirang TV", yt: "nMEBVADq4tQ", cat: "Cultura" }
    ]},
    { country: "España", lat: 40.41, lng: -3.70, code: "ES", channels: [
        { name: "RTVE Noticias", yt: "H5_NKEWB8WA", cat: "Noticias" }
    ]}
];

/* --- LÓGICA THREE.JS (GLOBO) --- */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

camera.position.z = 2.8;

// Esfera de la Tierra
const geometry = new THREE.SphereGeometry(1, 64, 64);
const texture = new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-night.jpg');
const material = new THREE.MeshPhongMaterial({ map: texture, bumpScale: 0.05, specular: new THREE.Color('grey'), shininess: 10 });
const earth = new THREE.Mesh(geometry, material);
scene.add(earth);

// Luces
scene.add(new THREE.AmbientLight(0xbbbbbb, 0.3));
const sunLight = new THREE.DirectionalLight(0xffffff, 1);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

// Puntos (Dots)
const dotsGroup = new THREE.Group();
scene.add(dotsGroup);

function latLongToVector3(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}

TV_DATA.forEach(data => {
    const pos = latLongToVector3(data.lat, data.lng, 1.02);
    const dotGeo = new THREE.SphereGeometry(0.015, 12, 12);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0xd4a843 });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.copy(pos);
    dot.userData = data;
    dotsGroup.add(dot);
});

/* --- INTERACCIÓN --- */
let isDragging = false;
let mouseX = 0, mouseY = 0;
let targetRotationX = 0, targetRotationY = 0;

container.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', (e) => {
    if (isDragging) {
        targetRotationY += e.movementX * 0.005;
        targetRotationX += e.movementY * 0.005;
    }
});

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

container.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(dotsGroup.children);
    if (intersects.length > 0) {
        openCountry(intersects[0].object.userData);
    }
});

function openCountry(data) {
    document.getElementById('p-name').textContent = data.country.toUpperCase();
    document.getElementById('p-meta').textContent = `${data.channels.length} CANALES EN VIVO`;
    const list = document.getElementById('p-list');
    list.innerHTML = '';
    
    data.channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
            <div class="thumb">
                <span class="live-tag">Vivo</span>
                <img src="https://img.youtube.com/vi/${ch.yt}/hqdefault.jpg">
            </div>
            <div class="card-info">
                <div class="card-name">${ch.name}</div>
                <div class="card-cat">${ch.cat}</div>
            </div>
        `;
        card.onclick = () => openPlayer(ch.name, ch.yt);
        list.appendChild(card);
    });
    
    document.getElementById('panel').classList.add('open');
}

function openPlayer(title, ytId) {
    document.getElementById('m-title').textContent = title;
    document.getElementById('m-iframe').src = `https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1`;
    document.getElementById('modal').classList.add('active');
}

function closePlayer() {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('m-iframe').src = '';
}

// Loop de animación
function animate() {
    requestAnimationFrame(animate);
    earth.rotation.y += 0.001;
    dotsGroup.rotation.y += 0.001;
    
    earth.rotation.y += (targetRotationY - earth.rotation.y) * 0.05;
    earth.rotation.x += (targetRotationX - earth.rotation.x) * 0.05;
    dotsGroup.rotation.y = earth.rotation.y;
    dotsGroup.rotation.x = earth.rotation.x;
    
    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
