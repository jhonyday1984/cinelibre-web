<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CineLibre 3D — TV Global Interactiva</title>
<meta name="description" content="Explora la televisión abierta del mundo en 3D. TV de Chile, Argentina, México, España y más.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #d4a843; --gold2: #f0c96a;
    --red: #e03545; --bg: #07070f;
    --bg2: #0d0d1a; --bd: rgba(255,255,255,.08);
    --txt: #ede9e2; --mut: #6b6575;
    --fh: 'Bebas Neue', sans-serif; --fb: 'DM Sans', sans-serif;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--txt); font-family:var(--fb); }

#cv-container { 
    position:fixed; inset:0; cursor:grab; 
    background: radial-gradient(circle at 38% 48%, #101025 0%, #07070f 62%); 
}
#cv-container:active { cursor:grabbing; }

/* Loader */
#loader {
    position:fixed; inset:0; z-index:9999; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition: opacity .8s ease;
}
.loading-logo { font-family:var(--fh); font-size:3rem; letter-spacing:4px; margin-bottom:12px; }
.loading-logo span { color:var(--gold); }
.bar-wrap { width:220px; height:3px; background:rgba(255,255,255,.1); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; width:0; background:linear-gradient(90deg, var(--gold), var(--gold2)); transition: width .5s ease; }

/* Header */
#top {
    position:fixed; top:0; left:0; right:0; height:64px; z-index:500;
    background: rgba(7,7,15,.85); backdrop-filter: blur(25px);
    border-bottom: 1px solid var(--bd); 
    display:flex; align-items:center; padding:0 20px; gap:15px;
}
.logo { font-family:var(--fh); font-size:1.85rem; letter-spacing:2px; color:var(--txt); text-decoration:none; }
.logo b { color:var(--gold); }

#search-container {
    flex:1; max-width:380px; position:relative;
}
#country-search {
    width:100%; padding:10px 16px 10px 42px;
    background:rgba(255,255,255,.08); border:1px solid var(--bd);
    border-radius:50px; color:white; font-size:1rem;
    outline:none; transition:all .3s;
}
#country-search:focus {
    border-color:var(--gold); background:rgba(255,255,255,.12);
}
#search-icon {
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    color:var(--mut); pointer-events:none;
}

/* Panel lateral */
#side-panel {
    position:fixed; top:64px; left:0; bottom:0; width:360px; z-index:400;
    background: rgba(10,10,20,.96); border-right: 1px solid var(--bd);
    backdrop-filter: blur(30px);
    transform: translateX(-100%); transition: transform .4s cubic-bezier(0.32, 0.72, 0, 1);
    display:flex; flex-direction:column;
}
#side-panel.open { transform: translateX(0); }

.p-head { padding:25px 20px; border-bottom:1px solid var(--bd); }
.p-country { font-family:var(--fh); font-size:2.3rem; color:var(--gold); line-height:1; }
.p-info { font-size:0.8rem; color:var(--mut); margin-top:6px; letter-spacing:1px; }

.c-list { flex:1; overflow-y:auto; padding:15px; scrollbar-width:thin; }
.card {
    background: rgba(255,255,255,.03); border: 1px solid var(--bd);
    border-radius:14px; margin-bottom:15px; overflow:hidden;
    cursor:pointer; transition: all .25s ease;
}
.card:hover { 
    border-color:var(--gold); 
    transform: translateY(-4px); 
    background: rgba(212,168,67,.06); 
    box-shadow: 0 10px 20px rgba(212,168,67,.1);
}

/* Resto de estilos (mantengo los tuyos) */
.card-img { width:100%; aspect-ratio:16/9; background:#000; position:relative; }
.card-img img { width:100%; height:100%; object-fit:cover; }
.card-live { 
    position:absolute; top:10px; left:10px; background:var(--red); 
    padding:3px 9px; font-size:10px; font-weight:bold; border-radius:4px; 
}
.card-body { padding:12px; }
.card-title { font-weight:700; font-size:0.95rem; margin-bottom:4px; }
.card-tag { font-size:0.75rem; color:var(--mut); }

/* Modal Player */
#modal {
    position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.97);
    display:none; align-items:center; justify-content:center; padding:20px;
}
#modal.active { display:flex; }
.modal-box { 
    width:100%; max-width:1080px; background:var(--bg2); 
    border-radius:20px; overflow:hidden; border:1px solid var(--bd); 
}
.modal-nav { 
    padding:16px 24px; display:flex; justify-content:space-between; 
    align-items:center; background:var(--bg); 
}
.iframe-wrap { position:relative; width:100%; aspect-ratio:16/9; background:#000; }
.iframe-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }

@media (max-width: 700px) {
    #side-panel { width:100%; height:70vh; top:auto; bottom:0; border-radius:25px 25px 0 0; transform: translateY(100%); }
    #side-panel.open { transform: translateY(0); }
}
</style>
</head>
<body>

<div id="loader">
    <div class="loading-logo">CINE<b>LIBRE</b></div>
    <div class="bar-wrap"><div class="bar-fill" id="fill"></div></div>
</div>

<div id="cv-container"></div>

<header id="top">
    <a href="#" class="logo">CINE<b>LIBRE</b> 3D</a>
    
    <div id="search-container">
        <span id="search-icon">🔎</span>
        <input type="text" id="country-search" placeholder="Buscar país... (ej: Chile, México)" autocomplete="off">
    </div>

    <div id="loc-tag" style="margin-left:auto; font-size:0.8rem; color:var(--gold); background:rgba(212,168,67,.1); padding:6px 14px; border-radius:50px; border:1px solid rgba(212,168,67,.25);">
        <div class="pulse" style="width:7px;height:7px;background:var(--gold);border-radius:50%;animation:p 1.5s infinite;"></div>
        <span id="user-loc">Detectando señal...</span>
    </div>
</header>

<aside id="side-panel">
    <div class="p-head">
        <div class="p-country" id="cur-country">MUNDO</div>
        <div class="p-info" id="cur-info">Selecciona un país en el globo o busca arriba</div>
    </div>
    <div class="c-list" id="cur-list"></div>
</aside>

<!-- Modal Player -->
<div id="modal">
    <div class="modal-box">
        <div class="modal-nav">
            <h3 id="m-name" style="font-family:var(--fh); color:var(--gold);">Cargando canal...</h3>
            <button onclick="closePlayer()" style="background:none;border:none;color:#fff;font-size:28px;cursor:pointer;">✕</button>
        </div>
        <div class="iframe-wrap">
            <iframe id="m-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ==================== BASE DE DATOS ====================
const TV_DB = [ /* ... tu base de datos actual (la dejé igual) ... */ 
    { country: "Chile", lat: -33.45, lng: -70.67, channels: [
        { name: "24 Horas TVN", yt: "mBBFJMsMPkY", cat: "Noticias" },
        { name: "T13 En Vivo", yt: "4nkuK7eBpgk", cat: "Noticias" },
        { name: "Mega Chile", yt: "B51INQJ6Ry4", cat: "Entretenimiento" },
        { name: "CHV Noticias", yt: "zcWXboTnous", cat: "Noticias" }
    ]},
    { country: "Argentina", lat: -34.6, lng: -58.38, channels: [
        { name: "TN Todo Noticias", yt: "cb12KmMMDJA", cat: "Noticias" },
        { name: "A24 Argentina", yt: "ArKbAx1K-2U", cat: "Noticias" },
        { name: "C5N En Vivo", yt: "jTDk5CswBVk", cat: "Noticias" }
    ]},
    // ... agrega más países aquí
];

// ==================== THREE.JS SETUP ====================
const container = document.getElementById('cv-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);
camera.position.z = 3.2;

// Globo
const globe = new THREE.Mesh(
    new THREE.SphereGeometry(1, 64, 64),
    new THREE.MeshPhongMaterial({
        map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-night.jpg'),
        shininess: 8
    })
);
scene.add(globe);

// Luces
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.PointLight(0xffffff, 1.2);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

// Puntos
const dotsGroup = new THREE.Group();
scene.add(dotsGroup);

let currentData = null;

// ==================== FUNCIONES ====================
function createDots(filteredData = TV_DB) {
    dotsGroup.clear();
    filteredData.forEach(country => {
        const phi = (90 - country.lat) * (Math.PI / 180);
        const theta = (country.lng + 180) * (Math.PI / 180);

        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.022, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xd4a843 })
        );

        dot.position.set(
            -1.025 * Math.sin(phi) * Math.cos(theta),
            1.025 * Math.cos(phi),
            1.025 * Math.sin(phi) * Math.sin(theta)
        );
        dot.userData = country;
        dotsGroup.add(dot);
    });
}

createDots();

// ==================== INTERACCIÓN ====================
let isDragging = false;
let targetRotationX = 0;
let targetRotationY = Math.PI;

container.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
    if (isDragging) {
        targetRotationY += e.movementX * 0.005;
        targetRotationX += e.movementY * 0.004;
    }
});

// Click en puntos
container.addEventListener('click', e => {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
    );

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(dotsGroup.children);

    if (intersects.length > 0) {
        openPanel(intersects[0].object.userData);
    }
});

// Buscador
const searchInput = document.getElementById('country-search');
searchInput.addEventListener('input', () => {
    const term = searchInput.value.toLowerCase().trim();
    
    if (!term) {
        createDots();
        return;
    }

    const filtered = TV_DB.filter(c => 
        c.country.toLowerCase().includes(term)
    );
    createDots(filtered);
});

// ==================== PANEL Y PLAYER ====================
function openPanel(data) {
    currentData = data;
    document.getElementById('cur-country').textContent = data.country.toUpperCase();
    document.getElementById('cur-info').textContent = `${data.channels.length} señales en vivo`;

    const list = document.getElementById('cur-list');
    list.innerHTML = '';

    data.channels.forEach(ch => {
        list.innerHTML += `
            <div class="card" onclick="play('${ch.name}','${ch.yt}')">
                <div class="card-img">
                    <span class="card-live">VIVO</span>
                    <img src="https://img.youtube.com/vi/${ch.yt}/mqdefault.jpg" loading="lazy">
                </div>
                <div class="card-body">
                    <div class="card-title">${ch.name}</div>
                    <div class="card-tag">${ch.cat} · HD</div>
                </div>
            </div>`;
    });

    document.getElementById('side-panel').classList.add('open');
}

window.play = function(name, ytId) {
    document.getElementById('m-name').textContent = name;
    document.getElementById('m-frame').src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
    document.getElementById('modal').classList.add('active');
};

window.closePlayer = function() {
    const modal = document.getElementById('modal');
    modal.classList.remove('active');
    setTimeout(() => {
        document.getElementById('m-frame').src = '';
    }, 600);
};

// ==================== ANIMACIÓN ====================
function animate() {
    requestAnimationFrame(animate);
    
    // Suavizado
    globe.rotation.x = THREE.MathUtils.lerp(globe.rotation.x, targetRotationX, 0.12);
    globe.rotation.y = THREE.MathUtils.lerp(globe.rotation.y, targetRotationY, 0.12);
    dotsGroup.rotation.copy(globe.rotation);

    renderer.render(scene, camera);
}
animate();

// ==================== RESPONSIVE ====================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ==================== INICIO ====================
function updateProgress(p) {
    document.getElementById('fill').style.width = p + '%';
    if (p >= 100) {
        setTimeout(() => document.getElementById('loader').style.opacity = '0', 600);
    }
}

async function getLoc() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        document.getElementById('user-loc').textContent = `${data.city || 'Tu ciudad'}, ${data.country_code}`;
        
        // Opcional: centrar automáticamente
        // flyTo(data.latitude, data.longitude);
    } catch (e) {
        document.getElementById('user-loc').textContent = "TV Global";
    }
    updateProgress(100);
}

updateProgress(35);
getLoc();
</script>
</body>
</html>
