<script>

let DB = {};
let hls = null;
const video = document.getElementById('video');

// ==========================
// API IPTV-ORG REAL
// ==========================
async function startAPI() {

    try {

        const fill = document.getElementById('fill');

        // CHANNELS
        const chRes = await fetch(
            'https://iptv-org.github.io/api/channels.json'
        );

        const channels = await chRes.json();

        fill.style.width = '40%';

        // STREAMS
        const stRes = await fetch(
            'https://iptv-org.github.io/api/streams.json'
        );

        const streams = await stRes.json();

        fill.style.width = '80%';

        // MAPA STREAMS
        const streamMap = {};

        streams.forEach(s => {

            if (
                s.channel &&
                s.url &&
                !streamMap[s.channel]
            ) {
                streamMap[s.channel] = s.url;
            }

        });

        // CREAR BASE
        channels.forEach(c => {

            if (
                COORDS[c.country] &&
                streamMap[c.id]
            ) {

                if (!DB[c.country]) {

                    DB[c.country] = {
                        ...COORDS[c.country],
                        list: []
                    };
                }

                DB[c.country].list.push({
                    name: c.name,
                    logo: c.logo,
                    url: streamMap[c.id]
                });
            }

        });

        fill.style.width = '100%';

        init3D();

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 500);

    } catch(err) {

        console.error(err);

        document.getElementById('load-msg').innerText =
            'ERROR API IPTV';

    }
}

// ==========================
// PAÍSES
// ==========================
const COORDS = {

    'cl': { n:'Chile', lat:-33.45, lng:-70.67 },
    'ar': { n:'Argentina', lat:-34.60, lng:-58.38 },
    'mx': { n:'México', lat:19.43, lng:-99.13 },
    'es': { n:'España', lat:40.41, lng:-3.70 },
    'co': { n:'Colombia', lat:4.71, lng:-74.07 },
    'us': { n:'EE.UU', lat:38.89, lng:-77.03 },
    'br': { n:'Brasil', lat:-15.79, lng:-47.88 },
    'pe': { n:'Perú', lat:-12.04, lng:-77.03 }

};

// ==========================
// MUNDO 3D
// ==========================
function init3D() {

    const container =
        document.getElementById('globe-container');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
    });

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    container.appendChild(renderer.domElement);

    // ======================
    // TIERRA
    // ======================

    const texture =
        new THREE.TextureLoader().load(
            'https://unpkg.com/three-globe/example/img/earth-night.jpg'
        );

    const earth = new THREE.Mesh(

        new THREE.SphereGeometry(1,64,64),

        new THREE.MeshPhongMaterial({
            map: texture
        })

    );

    scene.add(earth);

    // ======================
    // LUCES
    // ======================

    scene.add(
        new THREE.AmbientLight(0xffffff,1.2)
    );

    const dirLight =
        new THREE.DirectionalLight(0xffffff,1);

    dirLight.position.set(5,3,5);

    scene.add(dirLight);

    // ======================
    // PUNTOS
    // ======================

    const points = new THREE.Group();

    Object.values(DB).forEach(p => {

        const phi =
            (90 - p.lat) * (Math.PI / 180);

        const theta =
            (p.lng + 180) * (Math.PI / 180);

        const dot = new THREE.Mesh(

            new THREE.SphereGeometry(0.03,12,12),

            new THREE.MeshBasicMaterial({
                color:0xd4a843
            })

        );

        dot.position.set(

            -1.02 * Math.sin(phi) * Math.cos(theta),

            1.02 * Math.cos(phi),

            1.02 * Math.sin(phi) * Math.sin(theta)

        );

        dot.userData = p;

        points.add(dot);

    });

    scene.add(points);

    // ======================
    // CONTROL DRAG
    // ======================

    let dragging = false;
    let prevX = 0;
    let prevY = 0;

    container.addEventListener('mousedown', e => {

        dragging = true;

        prevX = e.clientX;
        prevY = e.clientY;

    });

    window.addEventListener('mouseup', () => {

        dragging = false;

    });

    window.addEventListener('mousemove', e => {

        if (!dragging) return;

        const dx = e.clientX - prevX;
        const dy = e.clientY - prevY;

        earth.rotation.y += dx * 0.005;
        points.rotation.y += dx * 0.005;

        earth.rotation.x += dy * 0.003;
        points.rotation.x += dy * 0.003;

        prevX = e.clientX;
        prevY = e.clientY;

    });

    // ======================
    // TOUCH MOBILE
    // ======================

    container.addEventListener('touchstart', e => {

        dragging = true;

        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;

    });

    container.addEventListener('touchmove', e => {

        if (!dragging) return;

        const dx =
            e.touches[0].clientX - prevX;

        const dy =
            e.touches[0].clientY - prevY;

        earth.rotation.y += dx * 0.005;
        points.rotation.y += dx * 0.005;

        earth.rotation.x += dy * 0.003;
        points.rotation.x += dy * 0.003;

        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;

    });

    window.addEventListener('touchend', () => {

        dragging = false;

    });

    // ======================
    // CLICK PUNTOS
    // ======================

    window.addEventListener('click', e => {

        const mouse = new THREE.Vector2(

            (e.clientX / window.innerWidth) * 2 - 1,

            -(e.clientY / window.innerHeight) * 2 + 1

        );

        const raycaster =
            new THREE.Raycaster();

        raycaster.setFromCamera(mouse,camera);

        const intersects =
            raycaster.intersectObjects(
                points.children
            );

        if (intersects.length > 0) {

            openPanel(
                intersects[0].object.userData
            );

        }

    });

    // ======================
    // RESPONSIVE
    // ======================

    window.addEventListener('resize', () => {

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    });

    // ======================
    // LOOP
    // ======================

    function animate() {

        requestAnimationFrame(animate);

        earth.rotation.y += 0.0008;
        points.rotation.y += 0.0008;

        renderer.render(scene,camera);

    }

    animate();

}

// ==========================
// PANEL
// ==========================
function openPanel(data) {

    document.getElementById(
        'country-name'
    ).innerText = data.n;

    const list =
        document.getElementById(
            'channel-list'
        );

    list.innerHTML = '';

    data.list.slice(0,40).forEach(ch => {

        const item =
            document.createElement('div');

        item.className = 'channel-item';

        item.innerHTML = `

            <img src="${ch.logo}"
            onerror="this.src='https://via.placeholder.com/45'">

            <span>${ch.name}</span>

        `;

        item.onclick = () => play(ch.url);

        list.appendChild(item);

    });

    document
        .getElementById('panel')
        .classList.add('active');

}

// ==========================
// PLAYER
// ==========================
function play(url) {

    document.getElementById(
        'player'
    ).style.display = 'flex';

    if (hls) {
        hls.destroy();
    }

    if (Hls.isSupported()) {

        hls = new Hls();

        hls.loadSource(url);

        hls.attachMedia(video);

        hls.on(
            Hls.Events.MANIFEST_PARSED,
            () => video.play()
        );

    } else {

        video.src = url;

        video.play();

    }

}

// ==========================
// CLOSE
// ==========================
function closePlayer() {

    document.getElementById(
        'player'
    ).style.display = 'none';

    video.pause();

    video.src = '';

    if (hls) {
        hls.destroy();
    }

}

// ==========================
// START
// ==========================
startAPI();

</script>
