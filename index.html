<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineLibre 3D - Conexión Satelital</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4a843; --bg: #050508; --fh: 'Bebas Neue', sans-serif; --fb: 'DM Sans', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: var(--fb); overflow: hidden; }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar { width: 200px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 20px; }
        #fill { height: 100%; width: 0%; background: var(--gold); transition: 0.5s; }

        header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); display: flex; align-items: center; padding: 0 20px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-family: var(--fh); font-size: 1.8rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        #globe-container { position: fixed; inset: 0; cursor: grab; }

        #panel { position: fixed; right: 0; top: 0; width: 350px; height: 100%; background: rgba(10,10,18,0.98); transform: translateX(100%); transition: 0.5s; z-index: 200; overflow-y: auto; padding: 20px; border-left: 1px solid var(--gold); }
        #panel.active { transform: translateX(0); }
        
        .channel-item { display: flex; align-items: center; gap: 15px; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; }
        .channel-item:hover { background: rgba(212,168,67,0.2); }
        .channel-item img { width: 45px; height: 45px; object-fit: contain; }

        #player { position: fixed; inset: 0; background: #000; display: none; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 100%; max-width: 900px; aspect-ratio: 16/9; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="loader">
    <div class="logo">CINE<span>LIBRE</span> 3D</div>
    <div class="bar"><div id="fill"></div></div>
    <p id="load-msg">CONECTANDO A IPTV-ORG...</p>
</div>

<header><div class="logo">CINE<span>LIBRE</span> 3D</div></header>
<div id="globe-container"></div>

<div id="panel">
    <h2 id="country-name" style="font-family: var(--fh); color: var(--gold);">PAÍS</h2>
    <div id="channel-list"></div>
    <button onclick="document.getElementById('panel').classList.remove('active')" style="width:100%; margin-top:20px; padding:10px; background:none; border:1px solid #fff; color:#fff; cursor:pointer;">CERRAR</button>
</div>

<div id="player">
    <div onclick="closePlayer()" style="position:absolute; top:20px; right:20px; cursor:pointer; font-size:24px;">✕</div>
    <video id="video" controls autoplay></video>
</div>

<script>
let DB = {};
const hls = new Hls();
const video = document.getElementById('video');

// LISTA DE PAÍSES PARA EL GLOBO
const COORDS = {
    'cl': { n: 'Chile', lat: -33.45, lng: -70.67 },
    'ar': { n: 'Argentina', lat: -34.60, lng: -58.38 },
    'mx': { n: 'México', lat: 19.43, lng: -99.13 },
    'es': { n: 'España', lat: 40.41, lng: -3.70 },
    'co': { n: 'Colombia', lat: 4.71, lng: -74.07 },
    'us': { n: 'EE.UU', lat: 38.89, lng: -77.03 }
};

async function startAPI() {
    try {
        const fill = document.getElementById('fill');
        
        // PETICIÓN 1: CANALES (Tu imagen de GitHub)
        const res1 = await fetch('https://iptv-org.github.io/api/channels.json');
        const channels = await res1.json();
        fill.style.width = '50%';

        // PETICIÓN 2: STREAMS (Los links reales)
        const res2 = await fetch('https://iptv-org.github.io/api/streams.json');
        const streams = await res2.json();
        fill.style.width = '100%';

        // UNIR DATOS
        const streamMap = {};
        streams.forEach(s => { if(!streamMap[s.channel]) streamMap[s.channel] = s.url; });

        channels.forEach(c => {
            if(COORDS[c.country] && streamMap[c.id]) {
                if(!DB[c.country]) DB[c.country] = { ...COORDS[c.country], list: [] };
                DB[c.country].list.push({ name: c.name, logo: c.logo, url: streamMap[c.id] });
            }
        });

        init3D();
        document.getElementById('loader').style.display = 'none';
    } catch(e) {
        document.getElementById('load-msg').innerText = "ERROR DE API: RECARGA";
    }
}

function init3D() {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('globe-container').appendChild(renderer.domElement);

    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({ map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-night.jpg') })
    );
    scene.add(earth);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    camera.position.z = 3;

    const points = new THREE.Group();
    Object.values(DB).forEach(p => {
        const phi = (90 - p.lat) * (Math.PI / 180);
        const theta = (p.lng + 180) * (Math.PI / 180);
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.03, 12, 12), new THREE.MeshBasicMaterial({color: 0xd4a843}));
        dot.position.set(-1.02 * Math.sin(phi) * Math.cos(theta), 1.02 * Math.cos(phi), 1.02 * Math.sin(phi) * Math.sin(theta));
        dot.userData = p;
        points.add(dot);
    });
    scene.add(points);

    function anim() {
        requestAnimationFrame(anim);
        earth.rotation.y += 0.001;
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }
    anim();

    window.addEventListener('click', e => {
        const m = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(m, camera);
        const hit = ray.intersectObjects(points.children);
        if(hit.length > 0) openPanel(hit[0].object.userData);
    });
}

function openPanel(data) {
    document.getElementById('country-name').innerText = data.n;
    const list = document.getElementById('channel-list');
    list.innerHTML = '';
    data.list.slice(0, 30).forEach(ch => {
        const item = document.createElement('div');
        item.className = 'channel-item';
        item.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/45'"> <span>${ch.name}</span>`;
        item.onclick = () => play(ch.url);
        list.appendChild(item);
    });
    document.getElementById('panel').classList.add('active');
}

function play(url) {
    document.getElementById('player').style.display = 'flex';
    if(Hls.isSupported()) {
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
        video.src = url;
        video.play();
    }
}

function closePlayer() {
    document.getElementById('player').style.display = 'none';
    video.pause();
    hls.detachMedia();
}

startAPI();
</script>
