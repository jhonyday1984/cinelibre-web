<script>
let DB = {};
let hls;
const video = document.getElementById('video');

// ==========================
// PARSER M3U DIRECTO
// ==========================
async function loadM3U() {
    try {
        const fill = document.getElementById('fill');

        const res = await fetch('https://iptv-org.github.io/iptv/index.m3u');
        const text = await res.text();

        fill.style.width = '40%';

        const lines = text.split('\n');

        let current = {};

        lines.forEach(line => {

            if (line.startsWith('#EXTINF')) {

                const countryMatch = line.match(/tvg-country="(.*?)"/);
                const logoMatch = line.match(/tvg-logo="(.*?)"/);
                const nameMatch = line.split(',').pop();

                current = {
                    country: countryMatch ? countryMatch[1].toLowerCase() : '',
                    logo: logoMatch ? logoMatch[1] : '',
                    name: nameMatch || 'Canal'
                };

            } else if (
                line.startsWith('http')
            ) {

                current.url = line.trim();

                if (COORDS[current.country]) {

                    if (!DB[current.country]) {
                        DB[current.country] = {
                            ...COORDS[current.country],
                            list: []
                        };
                    }

                    DB[current.country].list.push({
                        name: current.name,
                        logo: current.logo,
                        url: current.url
                    });
                }
            }
        });

        fill.style.width = '100%';

        init3D();

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 700);

    } catch(e) {
        console.error(e);
        document.getElementById('load-msg').innerText =
            "ERROR CARGANDO IPTV";
    }
}

// ==========================
// PAÍSES
// ==========================
const COORDS = {
    'cl': { n: 'Chile', lat: -33.45, lng: -70.67 },
    'ar': { n: 'Argentina', lat: -34.60, lng: -58.38 },
    'mx': { n: 'México', lat: 19.43, lng: -99.13 },
    'es': { n: 'España', lat: 40.41, lng: -3.70 },
    'co': { n: 'Colombia', lat: 4.71, lng: -74.07 },
    'us': { n: 'EE.UU', lat: 38.89, lng: -77.03 }
};

// ==========================
// GLOBO 3D MOVIBLE
// ==========================
function init3D() {

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);

    document
        .getElementById('globe-container')
        .appendChild(renderer.domElement);

    // ======================
    // TIERRA
    // ======================

    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshPhongMaterial({
            map: new THREE.TextureLoader().load(
                'https://unpkg.com/three-globe/example/img/earth-night.jpg'
            )
        })
    );

    scene.add(earth);

    // ======================
    // LUCES
    // ======================

    scene.add(new THREE.AmbientLight(0xffffff, 1.3));

    const light = new THREE.DirectionalLight(0xffffff, 1);

    light.position.set(5, 3, 5);

    scene.add(light);

    camera.position.z = 3;

    // ======================
    // PUNTOS
    // ======================

    const points = new THREE.Group();

    Object.values(DB).forEach(p => {

        const phi = (90 - p.lat) * (Math.PI / 180);
        const theta = (p.lng + 180) * (Math.PI / 180);

        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.03, 12, 12),
            new THREE.MeshBasicMaterial({
                color: 0xd4a843
            })
        );

        dot.position.set(
            -1.02 * Math.sin(phi) * Math.cos(theta),
            1.02 * Math.cos(phi),
            1.02 * Math.sin(phi) * Math.sin(theta)
        );

        dot.userData = p;

        points.add(dot);
    });

    scene.add(points);

    // ======================
    // DRAG MUNDO
    // ======================

    let isDragging = false;
    let prevX = 0;
    let prevY = 0;

    renderer.domElement.addEventListener('mousedown', e => {
        isDragging = true;
        prevX = e.clientX;
        prevY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    window.addEventListener('mousemove', e => {

        if (!isDragging) return;

        const deltaX = e.clientX - prevX;
        const deltaY = e.clientY - prevY;

        earth.rotation.y += deltaX * 0.005;
        points.rotation.y += deltaX * 0.005;

        earth.rotation.x += deltaY * 0.002;
        points.rotation.x += deltaY * 0.002;

        prevX = e.clientX;
        prevY = e.clientY;
    });

    // ======================
    // TOUCH MOBILE
    // ======================

    renderer.domElement.addEventListener('touchstart', e => {
        isDragging = true;
        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;
    });

    renderer.domElement.addEventListener('touchmove', e => {

        if (!isDragging) return;

        const deltaX = e.touches[0].clientX - prevX;
        const deltaY = e.touches[0].clientY - prevY;

        earth.rotation.y += deltaX * 0.005;
        points.rotation.y += deltaX * 0.005;

        earth.rotation.x += deltaY * 0.002;
        points.rotation.x += deltaY * 0.002;

        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;
    });

    window.addEventListener('touchend', () => {
        isDragging = false;
    });

    // ======================
    // CLICK CANALES
    // ======================

    window.addEventListener('click', e => {

        const m = new THREE.Vector2(
            (e.clientX / window.innerWidth) * 2 - 1,
            -(e.clientY / window.innerHeight) * 2 + 1
        );

        const ray = new THREE.Raycaster();

        ray.setFromCamera(m, camera);

        const hit = ray.intersectObjects(points.children);

        if (hit.length > 0) {
            openPanel(hit[0].object.userData);
        }
    });

    // ======================
    // RESPONSIVE
    // ======================

    window.addEventListener('resize', () => {

        camera.aspect =
            window.innerWidth / window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    });

    // ======================
    // ANIMACIÓN
    // ======================

    function anim() {

        requestAnimationFrame(anim);

        earth.rotation.y += 0.0008;
        points.rotation.y += 0.0008;

        renderer.render(scene, camera);
    }

    anim();
}

// ==========================
// PANEL
// ==========================
function openPanel(data) {

    document.getElementById('country-name').innerText = data.n;

    const list = document.getElementById('channel-list');

    list.innerHTML = '';

    data.list.slice(0, 40).forEach(ch => {

        const item = document.createElement('div');

        item.className = 'channel-item';

        item.innerHTML = `
            <img src="${ch.logo}"
            onerror="this.src='https://via.placeholder.com/45'">
            <span>${ch.name}</span>
        `;

        item.onclick = () => play(ch.url);

        list.appendChild(item);
    });

    document
        .getElementById('panel')
        .classList.add('active');
}

// ==========================
// PLAYER
// ==========================
function play(url) {

    document.getElementById('player').style.display = 'flex';

    if (hls) {
        hls.destroy();
    }

    if (Hls.isSupported()) {

        hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true
        });

        hls.loadSource(url);

        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });

    } else {

        video.src = url;

        video.play();
    }
}

// ==========================
// CERRAR PLAYER
// ==========================
function closePlayer() {

    document.getElementById('player').style.display = 'none';

    video.pause();

    video.src = '';

    if (hls) {
        hls.destroy();
    }
}

// ==========================
// START
// ==========================
loadM3U();

</script>
