<style>

:root{
--gold:#d4a843;
--bg:#050508;
--fh:'Bebas Neue',sans-serif;
--fb:'DM Sans',sans-serif;
}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:var(--fb);
color:white;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
background:#000;
z-index:99999;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.bar{
width:220px;
height:4px;
background:rgba(255,255,255,0.1);
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

#fill{
width:0%;
height:100%;
background:var(--gold);
transition:0.4s;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
padding:0 20px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-family:var(--fh);
font-size:2rem;
letter-spacing:2px;
}

.logo span{
color:var(--gold);
}

/* GLOBO */

#globe-container{
position:fixed;
inset:0;
cursor:grab;
}

/* PANEL */

#panel{
position:fixed;
right:0;
top:0;
width:360px;
height:100%;
background:rgba(8,8,15,0.98);
z-index:5000;
transform:translateX(100%);
transition:0.5s;
overflow-y:auto;
padding:20px;
box-sizing:border-box;
border-left:1px solid var(--gold);
}

#panel.active{
transform:translateX(0);
}

.channel-item{
display:flex;
align-items:center;
gap:15px;
padding:12px;
margin-bottom:10px;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:0.3s;
}

.channel-item:hover{
background:rgba(212,168,67,0.2);
}

.channel-item img{
width:45px;
height:45px;
object-fit:contain;
background:#111;
border-radius:8px;
}

/* PLAYER */

#player{
position:fixed;
inset:0;
background:#000;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999999;
}

video{
width:100%;
max-width:1100px;
aspect-ratio:16/9;
background:#000;
border:1px solid var(--gold);
}

.close-player{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
z-index:999999;
}

button{
background:none;
border:1px solid white;
color:white;
padding:10px;
width:100%;
margin-top:20px;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

</style>

<body>

<!-- LOADER -->
<div id="loader">

<div class="logo">
CINE<span>LIBRE</span> 3D
</div>

<div class="bar">
<div id="fill"></div>
</div>

<p id="load-msg">
CONECTANDO A IPTV-ORG...
</p>

</div>

<!-- HEADER -->
<header>
<div class="logo">
CINE<span>LIBRE</span> 3D
</div>
</header>

<!-- GLOBO -->
<div id="globe-container"></div>

<!-- PANEL -->
<div id="panel">

<h2 id="country-name"
style="
font-family:var(--fh);
color:var(--gold);
">
PAÍS
</h2>

<div id="channel-list"></div>

<button onclick="
document
.getElementById('panel')
.classList.remove('active')
">
CERRAR
</button>

</div>

<!-- PLAYER -->
<div id="player">

<div class="close-player"
onclick="closePlayer()">
✕
</div>

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

<script>

let DB = {};
let hls = null;

const video =
document.getElementById('video');

/* =========================
PAÍSES
========================= */

const COORDS = {

'cl':{
n:'Chile',
lat:-33.45,
lng:-70.67
},

'ar':{
n:'Argentina',
lat:-34.60,
lng:-58.38
},

'mx':{
n:'México',
lat:19.43,
lng:-99.13
},

'es':{
n:'España',
lat:40.41,
lng:-3.70
},

'co':{
n:'Colombia',
lat:4.71,
lng:-74.07
},

'us':{
n:'EE.UU',
lat:38.89,
lng:-77.03
},

'br':{
n:'Brasil',
lat:-15.79,
lng:-47.88
},

'pe':{
n:'Perú',
lat:-12.04,
lng:-77.03
}

};

/* =========================
API IPTV
========================= */

async function startAPI(){

try{

const fill =
document.getElementById('fill');

/* CHANNELS */

const channelsRes =
await fetch(
'https://iptv-org.github.io/api/channels.json'
);

const channels =
await channelsRes.json();

fill.style.width='50%';

/* STREAMS */

const streamsRes =
await fetch(
'https://iptv-org.github.io/api/streams.json'
);

const streams =
await streamsRes.json();

fill.style.width='100%';

/* MAP STREAMS */

const streamMap = {};

streams.forEach(s=>{

if(
s.channel &&
s.url &&
!streamMap[s.channel]
){

streamMap[s.channel]=s.url;

}

});

/* BUILD DB */

channels.forEach(c=>{

if(
COORDS[c.country] &&
streamMap[c.id]
){

if(!DB[c.country]){

DB[c.country]={
...COORDS[c.country],
list:[]
};

}

DB[c.country].list.push({

name:c.name,
logo:c.logo,
url:streamMap[c.id]

});

}

});

init3D();

setTimeout(()=>{

document
.getElementById('loader')
.style.display='none';

},700);

}catch(e){

console.error(e);

document
.getElementById('load-msg')
.innerText='ERROR IPTV API';

}

}

/* =========================
MUNDO 3D
========================= */

function init3D(){

const container =
document.getElementById(
'globe-container'
);

const scene =
new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
45,
window.innerWidth /
window.innerHeight,
0.1,
1000
);

camera.position.z=3;

const renderer =
new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

container.appendChild(
renderer.domElement
);

/* TIERRA */

const texture =
new THREE.TextureLoader().load(
'https://unpkg.com/three-globe/example/img/earth-night.jpg'
);

const earth =
new THREE.Mesh(

new THREE.SphereGeometry(
1,
64,
64
),

new THREE.MeshPhongMaterial({
map:texture
})

);

scene.add(earth);

/* LUCES */

scene.add(
new THREE.AmbientLight(
0xffffff,
1.2
)
);

const light =
new THREE.DirectionalLight(
0xffffff,
1
);

light.position.set(5,3,5);

scene.add(light);

/* PUNTOS */

const points =
new THREE.Group();

Object.values(DB).forEach(p=>{

const phi =
(90-p.lat)*
(Math.PI/180);

const theta =
(p.lng+180)*
(Math.PI/180);

const dot =
new THREE.Mesh(

new THREE.SphereGeometry(
0.03,
12,
12
),

new THREE.MeshBasicMaterial({
color:0xd4a843
})

);

dot.position.set(

-1.02 *
Math.sin(phi) *
Math.cos(theta),

1.02 *
Math.cos(phi),

1.02 *
Math.sin(phi) *
Math.sin(theta)

);

dot.userData=p;

points.add(dot);

});

scene.add(points);

/* DRAG */

let dragging=false;
let prevX=0;
let prevY=0;

container.addEventListener(
'mousedown',
e=>{

dragging=true;

prevX=e.clientX;
prevY=e.clientY;

}
);

window.addEventListener(
'mouseup',
()=>{

dragging=false;

}
);

window.addEventListener(
'mousemove',
e=>{

if(!dragging)return;

const dx =
e.clientX-prevX;

const dy =
e.clientY-prevY;

earth.rotation.y +=
dx*0.005;

points.rotation.y +=
dx*0.005;

earth.rotation.x +=
dy*0.003;

points.rotation.x +=
dy*0.003;

prevX=e.clientX;
prevY=e.clientY;

}
);

/* TOUCH */

container.addEventListener(
'touchstart',
e=>{

dragging=true;

prevX =
e.touches[0].clientX;

prevY =
e.touches[0].clientY;

}
);

container.addEventListener(
'touchmove',
e=>{

if(!dragging)return;

const dx =
e.touches[0].clientX
-prevX;

const dy =
e.touches[0].clientY
-prevY;

earth.rotation.y +=
dx*0.005;

points.rotation.y +=
dx*0.005;

earth.rotation.x +=
dy*0.003;

points.rotation.x +=
dy*0.003;

prevX =
e.touches[0].clientX;

prevY =
e.touches[0].clientY;

}
);

window.addEventListener(
'touchend',
()=>{

dragging=false;

}
);

/* CLICK */

window.addEventListener(
'click',
e=>{

const mouse =
new THREE.Vector2(

(e.clientX /
window.innerWidth)
*2-1,

-(e.clientY /
window.innerHeight)
*2+1

);

const raycaster =
new THREE.Raycaster();

raycaster.setFromCamera(
mouse,
camera
);

const hit =
raycaster.intersectObjects(
points.children
);

if(hit.length>0){

openPanel(
hit[0].object.userData
);

}

}
);

/* RESPONSIVE */

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

/* LOOP */

function animate(){

requestAnimationFrame(
animate
);

earth.rotation.y +=
0.0008;

points.rotation.y +=
0.0008;

renderer.render(
scene,
camera
);

}

animate();

}

/* =========================
PANEL
========================= */

function openPanel(data){

document
.getElementById(
'country-name'
)
.innerText=data.n;

const list =
document.getElementById(
'channel-list'
);

list.innerHTML='';

data.list
.slice(0,40)
.forEach(ch=>{

const item =
document.createElement('div');

item.className='channel-item';

item.innerHTML=`

<img
src="${ch.logo}"
onerror="
this.src=
'https://via.placeholder.com/45'
">

<span>${ch.name}</span>

`;

item.onclick=()=>play(ch.url);

list.appendChild(item);

});

document
.getElementById('panel')
.classList.add('active');

}

/* =========================
PLAYER
========================= */

function play(url){

document
.getElementById('player')
.style.display='flex';

if(hls){

hls.destroy();

}

if(Hls.isSupported()){

hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{

video.play();

}
);

}else{

video.src=url;

video.play();

}

}

/* =========================
CLOSE
========================= */

function closePlayer(){

document
.getElementById('player')
.style.display='none';

video.pause();

video.src='';

if(hls){

hls.destroy();

}

}

/* =========================
START
========================= */

startAPI();

</script>
