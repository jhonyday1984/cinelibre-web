<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineLibre 3D</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4a843;
--bg:#050508;
}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:'DM Sans',sans-serif;
color:white;
}

#loader{
position:fixed;
inset:0;
background:#000;
z-index:99999;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.bar{
width:220px;
height:4px;
background:#222;
margin-top:20px;
overflow:hidden;
}

#fill{
width:0%;
height:100%;
background:var(--gold);
transition:0.4s;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
padding:0 20px;
z-index:1000;
}

.logo{
font-family:'Bebas Neue',sans-serif;
font-size:2rem;
letter-spacing:2px;
}

.logo span{
color:var(--gold);
}

#globe-container{
position:fixed;
inset:0;
cursor:grab;
}

#panel{
position:fixed;
right:0;
top:0;
width:360px;
height:100%;
background:rgba(10,10,20,0.97);
transform:translateX(100%);
transition:0.4s;
z-index:9999;
overflow-y:auto;
padding:20px;
box-sizing:border-box;
border-left:1px solid var(--gold);
}

#panel.active{
transform:translateX(0);
}

.channel-item{
display:flex;
align-items:center;
gap:15px;
padding:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.05);
border-radius:10px;
cursor:pointer;
}

.channel-item:hover{
background:rgba(212,168,67,0.2);
}

.channel-item img{
width:45px;
height:45px;
object-fit:contain;
background:#111;
border-radius:8px;
}

#player{
position:fixed;
inset:0;
background:#000;
display:none;
align-items:center;
justify-content:center;
z-index:999999;
flex-direction:column;
}

video{
width:100%;
max-width:1000px;
aspect-ratio:16/9;
background:#000;
border:1px solid var(--gold);
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
}

button{
width:100%;
padding:10px;
background:none;
border:1px solid white;
color:white;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<div id="loader">
<div class="logo">CINE<span>LIBRE</span> 3D</div>
<div class="bar"><div id="fill"></div></div>
<p id="msg">CONECTANDO IPTV...</p>
</div>

<header>
<div class="logo">CINE<span>LIBRE</span> 3D</div>
</header>

<div id="globe-container"></div>

<div id="panel">

<h2 id="country-name"
style="
font-family:'Bebas Neue';
color:#d4a843;
">
PAÍS
</h2>

<div id="channel-list"></div>

<button onclick="
document
.getElementById('panel')
.classList.remove('active')
">
CERRAR
</button>

</div>

<div id="player">

<div class="close"
onclick="closePlayer()">
✕
</div>

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

<script>

const DB = {};

let hls = null;

const video =
document.getElementById('video');

const countries = {

cl:{n:'Chile',lat:-33,lng:-70},
ar:{n:'Argentina',lat:-34,lng:-58},
mx:{n:'México',lat:19,lng:-99},
co:{n:'Colombia',lat:4,lng:-74},
pe:{n:'Perú',lat:-12,lng:-77},
br:{n:'Brasil',lat:-15,lng:-47},
us:{n:'USA',lat:38,lng:-77},
es:{n:'España',lat:40,lng:-3},
fr:{n:'Francia',lat:48,lng:2},
de:{n:'Alemania',lat:52,lng:13},
it:{n:'Italia',lat:41,lng:12},
jp:{n:'Japón',lat:35,lng:139},
kr:{n:'Corea',lat:37,lng:126}

};

/* IPTV */

async function loadIPTV(){

try{

const fill =
document.getElementById('fill');

const ch =
await fetch(
'https://iptv-org.github.io/api/channels.json'
)
.then(r=>r.json());

fill.style.width='50%';

const st =
await fetch(
'https://iptv-org.github.io/api/streams.json'
)
.then(r=>r.json());

fill.style.width='100%';

const streams = {};

st.forEach(s=>{

if(
s.channel &&
s.url &&
s.status !== 'error'
){

if(!streams[s.channel]){

streams[s.channel]=s.url;

}

}

});

ch.forEach(c=>{

if(
countries[c.country] &&
streams[c.id]
){

if(!DB[c.country]){

DB[c.country]={
...countries[c.country],
list:[]
};

}

DB[c.country].list.push({

name:c.name,
logo:c.logo,
url:streams[c.id]

});

}

});

init3D();

setTimeout(()=>{

document
.getElementById('loader')
.style.display='none';

},1000);

}catch(e){

console.error(e);

document
.getElementById('msg')
.innerText='ERROR IPTV';

}

}

/* 3D */

function init3D(){

const container =
document.getElementById(
'globe-container'
);

const scene =
new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
45,
window.innerWidth /
window.innerHeight,
0.1,
1000
);

camera.position.z=3;

const renderer =
new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

container.appendChild(
renderer.domElement
);

/* EARTH */

const earth =
new THREE.Mesh(

new THREE.SphereGeometry(
1,
64,
64
),

new THREE.MeshPhongMaterial({

map:new THREE.TextureLoader().load(
'https://unpkg.com/three-globe/example/img/earth-night.jpg'
)

})

);

scene.add(earth);

scene.add(
new THREE.AmbientLight(
0xffffff,
1.4
)
);

const light =
new THREE.DirectionalLight(
0xffffff,
1
);

light.position.set(5,3,5);

scene.add(light);

/* POINTS */

const points =
new THREE.Group();

Object.entries(DB).forEach(([code,p])=>{

const phi =
(90-p.lat)*(Math.PI/180);

const theta =
(p.lng+180)*(Math.PI/180);

const dot =
new THREE.Mesh(

new THREE.SphereGeometry(
0.03,
12,
12
),

new THREE.MeshBasicMaterial({
color:0xd4a843
})

);

dot.position.set(

-1.02 *
Math.sin(phi) *
Math.cos(theta),

1.02 *
Math.cos(phi),

1.02 *
Math.sin(phi) *
Math.sin(theta)

);

dot.userData=p;

points.add(dot);

});

scene.add(points);

/* MOVE */

let drag=false;
let px=0;
let py=0;

container.addEventListener(
'mousedown',
e=>{

drag=true;
px=e.clientX;
py=e.clientY;

}
);

window.addEventListener(
'mouseup',
()=>drag=false
);

window.addEventListener(
'mousemove',
e=>{

if(!drag)return;

const dx=e.clientX-px;
const dy=e.clientY-py;

earth.rotation.y+=dx*0.005;
points.rotation.y+=dx*0.005;

earth.rotation.x+=dy*0.003;
points.rotation.x+=dy*0.003;

px=e.clientX;
py=e.clientY;

}
);

/* TOUCH */

container.addEventListener(
'touchstart',
e=>{

drag=true;

px=e.touches[0].clientX;
py=e.touches[0].clientY;

}
);

container.addEventListener(
'touchmove',
e=>{

if(!drag)return;

const dx=
e.touches[0].clientX-px;

const dy=
e.touches[0].clientY-py;

earth.rotation.y+=dx*0.005;
points.rotation.y+=dx*0.005;

earth.rotation.x+=dy*0.003;
points.rotation.x+=dy*0.003;

px=e.touches[0].clientX;
py=e.touches[0].clientY;

}
);

window.addEventListener(
'touchend',
()=>drag=false
);

/* CLICK */

window.addEventListener(
'click',
e=>{

const mouse =
new THREE.Vector2(

(e.clientX /
window.innerWidth)*2-1,

-(e.clientY /
window.innerHeight)*2+1

);

const ray =
new THREE.Raycaster();

ray.setFromCamera(
mouse,
camera
);

const hit =
ray.intersectObjects(
points.children
);

if(hit.length>0){

openPanel(
hit[0].object.userData
);

}

}
);

/* LOOP */

function animate(){

requestAnimationFrame(
animate
);

earth.rotation.y += 0.0008;
points.rotation.y += 0.0008;

renderer.render(
scene,
camera
);

}

animate();

}

/* PANEL */

function openPanel(data){

document
.getElementById('country-name')
.innerText=data.n;

const list =
document.getElementById(
'channel-list'
);

list.innerHTML='';

data.list
.slice(0,50)
.forEach(ch=>{

const item =
document.createElement('div');

item.className='channel-item';

item.innerHTML=`

<img src="${ch.logo || 'https://via.placeholder.com/45'}">

<span>${ch.name}</span>

`;

item.onclick=()=>play(ch.url);

list.appendChild(item);

});

document
.getElementById('panel')
.classList.add('active');

}

/* PLAYER */

function play(url){

document
.getElementById('player')
.style.display='flex';

if(hls){

hls.destroy();

}

if(Hls.isSupported()){

hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
()=>video.play()
);

}else{

video.src=url;
video.play();

}

}

/* CLOSE */

function closePlayer(){

document
.getElementById('player')
.style.display='none';

video.pause();

if(hls){

hls.destroy();

}

}

/* START */

loadIPTV();

</script>
